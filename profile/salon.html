<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروفايل الصالون | BarberFlow Pro</title>
    <meta name="description" content="إدارة صالونك وتفاصيله من هنا">
    
    <!-- CSS المركزي -->
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="../shared/css/global-navbar.css">
    <link rel="stylesheet" href="../shared/css/notifications.css">
    
    <!-- CSS الخاص بالصفحة -->
    <link rel="stylesheet" href="salon.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <!-- حاوية الشريط العلوي -->
    <div id="global-navbar-container"></div>

    <!-- قسم البطل (Hero) -->
    <section class="profile-hero">
        <div class="hero-image-container">
            <div class="hero-placeholder" id="heroPlaceholder">
                <i class="fas fa-cut"></i>
            </div>
            <img id="heroImage" class="hero-image" style="display: none;" alt="صورة الصالون">
            
            <div class="hero-overlay"></div>
            
            <div class="hero-badges">
                <span class="badge verified" id="verifiedBadge" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    موثق
                </span>
                <span class="badge featured" id="featuredBadge" style="display: none;">
                    <i class="fas fa-crown"></i>
                    مميز
                </span>
                <span class="badge status" id="statusBadge">
                    <i class="fas fa-clock"></i>
                    جاري التحميل...
                </span>
            </div>
            
            <div class="hero-actions">
                <button class="hero-action-btn" id="editCoverBtn" title="تغيير صورة الغلاف">
                    <i class="fas fa-camera"></i>
                </button>
                <button class="hero-action-btn" id="shareProfileBtn" title="مشاركة البروفايل">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        </div>
        
        <div class="hero-content">
            <div class="container">
                <div class="salon-header-info">
                    <div>
                        <h1 class="salon-name" id="salonName">جاري التحميل...</h1>
                        <div class="salon-meta">
                            <div class="meta-item">
                                <i class="fas fa-star"></i>
                                <span id="ratingValue">5.0</span>
                                <span class="meta-label" id="reviewsCount">(0 تقييم)</span>
                            </div>
                            <div class="meta-divider"></div>
                            <div class="meta-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span id="locationValue">الموقع</span>
                            </div>
                            <div class="meta-divider"></div>
                            <div class="meta-item">
                                <i class="fas fa-tag"></i>
                                <span id="salonType">نوع الصالون</span>
                            </div>
                        </div>
                    </div>
                    <div class="salon-status-indicator" id="salonStatus">
                        <span class="status-dot"></span>
                        <span class="status-text">غير نشط</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- أزرار الإدارة السريعة -->
    <section class="admin-actions">
        <div class="container">
            <div class="admin-grid">
                <button class="admin-btn primary" id="dashboardBtn">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </button>
                <button class="admin-btn" id="editSalonBtn">
                    <i class="fas fa-edit"></i>
                    <span>تعديل البيانات</span>
                </button>
                <button class="admin-btn" id="addServiceBtn">
                    <i class="fas fa-plus-circle"></i>
                    <span>إضافة خدمة</span>
                </button>
                <button class="admin-btn" id="viewBookingsBtn">
                    <i class="fas fa-calendar-check"></i>
                    <span>الحجوزات</span>
                </button>
                <button class="admin-btn" id="analyticsBtn">
                    <i class="fas fa-chart-line"></i>
                    <span>الإحصائيات</span>
                </button>
                <button class="admin-btn" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </button>
            </div>
        </div>
    </section>

    <!-- المحتوى الرئيسي -->
    <main class="profile-content">
        <div class="container">
            <!-- عن الصالون -->
            <section class="info-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        عن الصالون
                    </h2>
                    <button class="edit-section-btn" id="editAboutBtn">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
                <p class="about-text" id="aboutText">مرحباً بكم في صالوننا المميز.</p>
            </section>

            <!-- أوقات العمل -->
            <section class="info-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-clock"></i>
                        أوقات العمل
                    </h2>
                    <button class="edit-section-btn" id="editHoursBtn">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
                <div class="working-hours-card">
                    <div class="hours-row">
                        <i class="fas fa-calendar-day"></i>
                        <span id="workingDays">أيامنا: -</span>
                    </div>
                    <div class="hours-row">
                        <i class="fas fa-business-time"></i>
                        <span id="workingHours">ساعاتنا: -</span>
                    </div>
                </div>
            </section>

            <!-- الخدمات والأسعار -->
            <section class="info-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i>
                        الخدمات والأسعار
                    </h2>
                    <button class="edit-section-btn" id="editServicesBtn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="services-list" id="servicesList">
                    <!-- سيتم ملؤها ديناميكياً -->
                </div>
            </section>

            <!-- معرض الأعمال -->
            <section class="info-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-images"></i>
                        معرض الأعمال
                    </h2>
                    <button class="edit-section-btn" id="editGalleryBtn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="gallery-wrapper">
                    <div class="gallery-slider" id="gallerySlider">
                        <!-- سيتم ملؤها ديناميكياً -->
                    </div>
                </div>
            </section>

            <!-- الشهادات -->
            <section class="info-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-certificate"></i>
                        الشهادات والاعتمادات
                    </h2>
                    <button class="edit-section-btn" id="editCertsBtn">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="certificates-container" id="certificatesContainer">
                    <!-- سيتم ملؤها ديناميكياً -->
                </div>
            </section>

            <!-- التقييمات -->
            <section class="info-section">
                <h2 class="section-title">
                    <i class="fas fa-star"></i>
                    تقييمات الزبائن
                </h2>
                <div class="reviews-summary" id="reviewsSummary">
                    <div class="summary-rating">
                        <div class="big-rating" id="bigRating">5.0</div>
                        <div class="stars-display" id="starsDisplay"></div>
                        <div class="total-reviews" id="totalReviews">0 تقييم</div>
                    </div>
                    <div class="rating-bars" id="ratingBars"></div>
                </div>
                <div class="reviews-list" id="reviewsList">
                    <!-- سيتم ملؤها ديناميكياً -->
                </div>
            </section>
        </div>
    </main>

    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <!-- السكريبتات -->
    <script type="module" src="../shared/js/paths.js"></script>
    <script type="module" src="../shared/js/notifications.js"></script>
    <script type="module" src="../shared/js/global-navbar.js"></script>
    <script type="module" src="salon.js"></script>
</body>
</html>

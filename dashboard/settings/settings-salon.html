<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الصالون | BarberFlow Pro</title>
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="css/settings-salon.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- الشريط الجانبي (نفس القالب الأساسي) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>BarberFlow</h2>
                <button class="close-sidebar-btn" id="closeSidebar">&times;</button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" data-path="DASHBOARD">📊 النظرة العامة</a></li>
                    <li><a href="#" data-path="APPOINTMENTS">📅 المواعيد</a></li>
                    <li><a href="#" data-path="ANALYTICS">📈 التحليلات</a></li>
                    <li class="nav-divider">الإعدادات</li>
                    <li><a href="#" data-path="SETTINGS_GENERAL">⚙️ إعدادات عامة</a></li>
                    <li><a href="#" data-path="SETTINGS_SALON" class="active">✂️ إعدادات الصالون</a></li>
                    <li><a href="#" data-path="SETTINGS_STORE">🛍️ إعدادات المتجر</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="logout-link">🚪 تسجيل الخروج</a>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-toggle-btn" id="menuToggle">☰</button>
                <h1>إعدادات الصالون</h1>
                <div class="user-info">
                    <span id="userName">جاري التحميل...</span>
                    <div class="avatar">👤</div>
                </div>
            </header>

            <!-- منطقة المحتوى: إعدادات الصالون -->
            <div class="content-area">
                <div class="settings-card">
                    <h2>معلومات الصالون الأساسية</h2>
                    <form id="salonSettingsForm">
                        <div class="form-group">
                            <label for="salonName">اسم الصالون</label>
                            <input type="text" id="salonName" name="salonName" placeholder="اسم الصالون">
                        </div>
                        <div class="form-group">
                            <label for="salonAddress">العنوان التفصيلي</label>
                            <textarea id="salonAddress" name="salonAddress" placeholder="المدينة، الحي، الشارع"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="workingHours">أوقات العمل</label>
                            <input type="text" id="workingHours" name="workingHours" placeholder="مثال: 9:00 ص - 10:00 م">
                        </div>
                        <div class="form-group">
                            <label for="salonPhone">رقم هاتف الصالون</label>
                            <input type="tel" id="salonPhone" name="salonPhone" placeholder="+966xxxxxxxxx">
                        </div>
                        <button type="submit" class="btn-primary">حفظ إعدادات الصالون</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="settings-salon.js"></script>
</body>
</html>

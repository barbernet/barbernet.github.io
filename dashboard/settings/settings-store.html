<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المتجر | BarberFlow Pro</title>
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="settings-store.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- الشريط الجانبي (نفس القالب الأساسي) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>BarberFlow</h2>
                <button class="close-sidebar-btn" id="closeSidebar">&times;</button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" data-path="DASHBOARD">📊 النظرة العامة</a></li>
                    <li><a href="#" data-path="APPOINTMENTS">📅 المواعيد</a></li>
                    <li><a href="#" data-path="ANALYTICS">📈 التحليلات</a></li>
                    <li class="nav-divider">الإعدادات</li>
                    <li><a href="#" data-path="SETTINGS_GENERAL">⚙️ إعدادات عامة</a></li>
                    <li><a href="#" data-path="SETTINGS_SALON">✂️ إعدادات الصالون</a></li>
                    <li><a href="#" data-path="SETTINGS_STORE" class="active">🛍️ إعدادات المتجر</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="logout-link">🚪 تسجيل الخروج</a>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-toggle-btn" id="menuToggle">☰</button>
                <h1>إعدادات المتجر</h1>
                <div class="user-info">
                    <span id="userName">جاري التحميل...</span>
                    <div class="avatar">👤</div>
                </div>
            </header>

            <!-- منطقة المحتوى: إعدادات المتجر -->
            <div class="content-area">
                <div class="settings-card">
                    <h2>معلومات المتجر والشحن</h2>
                    <form id="storeSettingsForm">
                        <div class="form-group">
                            <label for="storeName">اسم المتجر</label>
                            <input type="text" id="storeName" name="storeName" placeholder="اسم المتجر">
                        </div>
                        <div class="form-group">
                            <label for="shippingPolicy">سياسة الشحن والإرجاع</label>
                            <textarea id="shippingPolicy" name="shippingPolicy" placeholder="تفاصيل سياسة الشحن، المدة، التكلفة..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="paymentMethods">طرق الدفع المقبولة</label>
                            <select id="paymentMethods" name="paymentMethods" multiple>
                                <option value="credit_card">بطاقة ائتمان</option>
                                <option value="apple_pay">Apple Pay</option>
                                <option value="cod">الدفع عند الاستلام</option>
                                <option value="bank_transfer">تحويل بنكي</option>
                            </select>
                            <small>اضغط مع الاستمرار (Ctrl/Cmd) لاختيار أكثر من خيار.</small>
                        </div>
                        <button type="submit" class="btn-primary">حفظ إعدادات المتجر</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="settings-store.js"></script>
</body>
</html>

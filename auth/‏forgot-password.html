<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور | BarberFlow Pro</title>
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="../shared/css/notifications.css">
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <div class="auth-container">
        <!-- الشعار -->
        <div class="auth-header">
            <a href="../index.html" class="logo">
                <i class="fas fa-cut"></i>
                <span>BarberFlow Pro</span>
            </a>
        </div>

        <!-- بطاقة نسيت كلمة المرور -->
        <div class="auth-card">
            <div class="auth-icon">
                <i class="fas fa-key"></i>
            </div>
            
            <h1>نسيت كلمة المرور؟</h1>
            <p class="auth-subtitle">
                لا تقلق! أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
            </p>

            <form id="forgotPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="example@domain.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" class="btn btn-accent auth-submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال رابط إعادة التعيين
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="auth-link">
                    <i class="fas fa-arrow-right"></i>
                    العودة إلى تسجيل الدخول
                </a>
            </div>
        </div>

        <!-- معلومات إضافية -->
        <div class="auth-info">
            <p>
                <i class="fas fa-shield-alt"></i>
                رابط إعادة التعيين صالح لمدة 24 ساعة فقط
            </p>
        </div>
    </div>

    <script type="module" src="forgot-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="استعادة كلمة المرور - BarberFlow Pro">
    <title>نسيت كلمة المرور | BarberFlow Pro</title>
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- التنسيقات المشتركة -->
    <link rel="stylesheet" href="../shared/styles/global.css">
    <link rel="stylesheet" href="../shared/styles/notifications.css">
    
    <!-- تنسيقات الصفحة -->
    <link rel="stylesheet" href="./forgot-password.css">
</head>
<body>
    
    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>
    
    <main class="auth-container">
        <!-- الشعار -->
        <header class="auth-header">
            <a href="../index.html" class="logo" data-path="INDEX">
                <i class="fas fa-cut"></i>
                <span>BarberFlow Pro</span>
            </a>
        </header>
        
        <!-- البطاقة الرئيسية -->
        <div class="auth-card">
            <div class="auth-icon">
                <i class="fas fa-key"></i>
            </div>
            
            <h1>نسيت كلمة المرور؟</h1>
            <p class="auth-subtitle">
                لا تقلق! أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
            </p>
            
            <!-- نموذج إعادة التعيين -->
            <form id="forgotPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input"
                        placeholder="example@email.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <button type="submit" class="auth-btn auth-submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال رابط إعادة التعيين
                </button>
            </form>
            
            <!-- التذييل -->
            <div class="auth-footer">
                <a href="#" class="auth-link" id="backToLoginLink" data-path="LOGIN">
                    <i class="fas fa-arrow-right"></i>
                    العودة إلى تسجيل الدخول
                </a>
            </div>
            
            <!-- معلومات إضافية -->
            <div class="auth-info">
                <p>
                    <i class="fas fa-clock"></i>
                    رابط إعادة التعيين صالح لمدة 24 ساعة فقط
                </p>
            </div>
        </div>
    </main>
    
    <!-- ملف الجافاسكربت -->
    <script type="module" src="./forgot-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور | BarberFlow Pro</title>
    <link rel="stylesheet" href="../shared/styles/global.css">
    <link rel="stylesheet" href="../shared/styles/notifications.css">
    <link rel="stylesheet" href="reset-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <div class="auth-container">
        <!-- الشعار -->
        <div class="auth-header">
            <a href="../index.html" class="logo">
                <i class="fas fa-cut"></i>
                <span>BarberFlow Pro</span>
            </a>
        </div>

        <!-- بطاقة إعادة التعيين -->
        <div class="auth-card">
            <div class="auth-icon">
                <i class="fas fa-lock"></i>
            </div>
            
            <h1>إعادة تعيين كلمة المرور</h1>
            <p class="auth-subtitle">
                أدخل كلمة المرور الجديدة لحسابك. تأكد من استخدام كلمة مرور قوية.
            </p>

            <form id="resetPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="newPassword">كلمة المرور الجديدة</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="newPassword" 
                            class="form-input" 
                            placeholder="أدخل كلمة المرور الجديدة"
                            required
                            minlength="8"
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-password" data-target="newPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                        <div class="strength-text"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-input" 
                            placeholder="أعد إدخال كلمة المرور"
                            required
                            autocomplete="new-password"
                        >
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="match-indicator" id="matchIndicator"></div>
                </div>

                <button type="submit" class="btn btn-accent auth-submit-btn" id="submitBtn">
                    <i class="fas fa-check"></i>
                    حفظ كلمة المرور الجديدة
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="auth-link">
                    <i class="fas fa-arrow-right"></i>
                    العودة إلى تسجيل الدخول
                </a>
            </div>
        </div>

        <!-- معلومات الأمان -->
        <div class="auth-info">
            <p>
                <i class="fas fa-shield-alt"></i>
                كلمة المرور يجب أن تكون 8 أحرف على الأقل
            </p>
        </div>
    </div>

    <script type="module" src="reset-password.js"></script>
</body>
</html>

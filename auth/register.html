<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | BarberFlow Pro</title>
    <meta name="description" content="انضم إلى BarberFlow اليوم! سجّل كزبون أو صاحب صالون أو تاجر في دقائق.">
    
    <!-- CSS المركزي -->
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="../shared/css/global-navbar.css">
    <link rel="stylesheet" href="../shared/css/notifications.css">
    
    <!-- CSS الخاص بالصفحة -->
    <link rel="stylesheet" href="register.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <div class="auth-page">
        <div class="auth-container">
            <!-- الرأس -->
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-cut"></i>
                    <span>BarberFlow Pro</span>
                </div>
                <h2 id="registerHeading">إنشاء حساب جديد</h2>
                <p id="registerSubheading">قم بملء البيانات التالية للمتابعة</p>
            </div>

            <!-- خطوة التسجيل -->
            <div id="registerStep" class="hidden-step">
                <form id="unifiedRegisterForm">
                    <div class="input-group">
                        <label for="regName" id="labelName">الاسم الكامل</label>
                        <input 
                            type="text" 
                            id="regName" 
                            placeholder="أدخل اسمك الكامل"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="regIdentifier">البريد الإلكتروني أو رقم الهاتف</label>
                        <input 
                            type="text" 
                            id="regIdentifier" 
                            placeholder="example@email.com أو 0612345678"
                            required
                        >
                    </div>

                    <div class="input-group hidden-step" id="passwordGroup">
                        <label for="regPassword">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="regPassword" 
                            placeholder="أدخل كلمة مرور قوية (6 أحرف على الأقل)"
                            minlength="6"
                        >
                    </div>

                    <button type="submit" class="auth-btn" id="mainSubmitBtn">
                        <span id="submitBtnText">متابعة التسجيل</span>
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </form>

                <!-- الفاصل -->
                <div class="divider">
                    <span>أو التسجيل السريع</span>
                </div>

                <!-- زر Google -->
                <button class="google-btn" id="googleBtn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>سجل باستخدام Google</span>
                </button>

                <!-- التذييل -->
                <div class="auth-footer">
                    <p>لديك حساب بالفعل؟ 
                        <a href="login.html">تسجيل الدخول</a>
                    </p>
                </div>
            </div>

            <!-- خطوة التحقق OTP -->
            <div id="verifyStep" class="hidden-step">
                <div class="verify-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h2>تأكيد الحساب</h2>
                <p class="step-desc">أدخل كود التحقق المكون من 6 أرقام المرسل إليك</p>

                <div class="input-group">
                    <input 
                        type="text" 
                        id="otpCode" 
                        placeholder="123456"
                        maxlength="6"
                        inputmode="numeric"
                        pattern="[0-9]*"
                    >
                </div>

                <button class="auth-btn" id="confirmOtpBtn">
                    <span>تأكيد وفتح الحساب</span>
                </button>

                <div id="timerContainer" style="display: none;">
                    <p>إعادة الإرسال خلال: <span id="timer">60</span> ثانية</p>
                </div>

                <button class="outline-btn" id="resendCodeBtn" style="display: none; margin-top: 15px;">
                    <i class="fas fa-redo"></i>
                    <span>إعادة إرسال الكود</span>
                </button>

                <button class="back-link-btn" id="backToRegisterBtn">
                    <i class="fas fa-arrow-right"></i>
                    <span>تعديل المعلومات</span>
                </button>
            </div>

            <!-- زر العودة -->
            <div class="back-home-container">
                <button class="outline-btn" id="backHomeBtn">
                    <i class="fas fa-home"></i>
                    <span>العودة للرئيسية</span>
                </button>
            </div>

            <!-- حاوية Recaptcha -->
            <div id="recaptcha-container"></div>
        </div>
    </div>

    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <!-- السكريبت الرئيسي -->
    <script type="module" src="register.js"></script>
</body>
</html>

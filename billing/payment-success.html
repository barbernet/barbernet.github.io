<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الاشتراك بنجاح | BarberFlow Pro</title>
    <meta name="description" content="تم تفعيل اشتراكك في BarberFlow Pro بنجاح">
    
    <link rel="stylesheet" href="../shared/css/global.css">
    <link rel="stylesheet" href="../shared/css/notifications.css">
    <link rel="stylesheet" href="payment-success.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <div class="success-page">
        <div class="success-container">
            <div class="success-icon-wrapper">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <div class="success-ring"></div>
                <div class="success-ring ring-2"></div>
            </div>

            <div class="success-content">
                <h1 class="success-title">تم الاشتراك بنجاح! 🎉</h1>
                <p class="success-subtitle">
                    مرحباً بك في عائلة BarberFlow Pro. تم تفعيل باقتك ويمكنك الآن الاستمتاع بجميع المميزات الحصرية.
                </p>

                <div class="subscription-details" id="subscriptionDetails">
                    <div class="detail-row">
                        <span class="detail-label">الباقة:</span>
                        <span class="detail-value" id="planName">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">تاريخ البدء:</span>
                        <span class="detail-value" id="startDate">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">تاريخ الانتهاء:</span>
                        <span class="detail-value" id="endDate">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">رقم المعاملة:</span>
                        <span class="detail-value ref-number" id="transactionId">-</span>
                    </div>
                </div>

                <div class="features-unlocked">
                    <h3><i class="fas fa-unlock"></i> المميزات المفعلة الآن</h3>
                    <ul class="features-list" id="featuresList">
                    </ul>
                </div>

                <div class="success-actions">
                    <button class="btn-primary" id="goToDashboardBtn">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>الذهاب إلى لوحة التحكم</span>
                    </button>
                    <button class="btn-secondary" id="goToHomeBtn">
                        <i class="fas fa-home"></i>
                        <span>العودة للرئيسية</span>
                    </button>
                </div>

                <div class="email-notice">
                    <i class="fas fa-envelope"></i>
                    <span>تم إرسال تفاصيل الاشتراك إلى بريدك الإلكتروني</span>
                </div>
            </div>
        </div>

        <div class="confetti-container" id="confettiContainer"></div>
    </div>

    <div id="notification-container"></div>
    <script type="module" src="../shared/js/paths.js"></script>
    <script type="module" src="../shared/js/notifications.js"></script>
    <script type="module" src="payment-success.js"></script>
</body>
</html>

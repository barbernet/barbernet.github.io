<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم إلغاء الدفع | BarberFlow Pro</title>
    <meta name="description" content="تم إلغاء عملية الدفع">
    
    <link rel="stylesheet" href="../shared/styles/global.css">
    <link rel="stylesheet" href="../shared/styles/notifications.css">
    <link rel="stylesheet" href="payment-cancel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <div class="cancel-page">
        <div class="cancel-container">
            <div class="cancel-icon-wrapper">
                <div class="cancel-icon">
                    <i class="fas fa-times"></i>
                </div>
            </div>

            <div class="cancel-content">
                <h1 class="cancel-title">تم إلغاء عملية الدفع</h1>
                <p class="cancel-subtitle">
                    لم يتم خصم أي مبلغ من حسابك. يمكنك المحاولة مرة أخرى في أي وقت.
                </p>

                <div class="common-reasons">
                    <h3><i class="fas fa-question-circle"></i> أسباب شائعة للإلغاء</h3>
                    <ul class="reasons-list">
                        <li><i class="fas fa-exclamation-triangle"></i> عدم كفاية الرصيد</li>
                        <li><i class="fas fa-exclamation-triangle"></i> معلومات البطاقة غير صحيحة</li>
                        <li><i class="fas fa-exclamation-triangle"></i> رفض البنك المصدر للبطاقة</li>
                        <li><i class="fas fa-exclamation-triangle"></i> انتهاء صلاحية البطاقة</li>
                    </ul>
                </div>

                <div class="cancel-actions">
                    <button class="btn-primary" id="retryPaymentBtn">
                        <i class="fas fa-redo"></i>
                        <span>إعادة المحاولة</span>
                    </button>
                    <button class="btn-secondary" id="goToHomeBtn">
                        <i class="fas fa-home"></i>
                        <span>العودة للرئيسية</span>
                    </button>
                </div>

                <div class="help-notice">
                    <i class="fas fa-headset"></i>
                    <span>هل تحتاج مساعدة؟ <a href="#" id="contactSupport">تواصل مع الدعم الفني</a></span>
                </div>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>
    <script type="module" src="../shared/utils/paths.js"></script>
    <script type="module" src="../shared/js/notifications.js"></script>
    <script type="module" src="payment-cancel.js"></script>
</body>
</html>

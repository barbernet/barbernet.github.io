<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك | BarberFlow Pro</title>
    <meta name="description" content="مرحباً بك في BarberFlow Pro - نبدأ بتخصيص تجربتك">
    
    <!-- CSS المركزي -->
    <link rel="stylesheet" href="../shared/styles/global.css">
    <link rel="stylesheet" href="../shared/styles/notifications.css">
    
    <!-- CSS الخاص بالصفحة -->
    <link rel="stylesheet" href="welcome.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <div class="welcome-page">
        <div class="welcome-container">
            <!-- أيقونة الترحيب المتحركة -->
            <div class="welcome-icon-wrapper">
                <div class="welcome-icon">
                    <i class="fas fa-cut"></i>
                </div>
                <div class="welcome-icon-glow"></div>
            </div>
            
            <!-- رسالة الترحيب الديناميكية -->
            <h1 id="welcomeTitle">مرحباً بك في BarberFlow Pro</h1>
            <p class="welcome-desc" id="welcomeDesc">
                جاري التعرف على حسابك...
            </p>
            
            <!-- مؤشر التقدم -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <!-- معلومات التوجيه -->
            <div class="redirect-info" id="redirectInfo">
                <i class="fas fa-spinner fa-spin"></i>
                <span id="redirectText">جاري التوجيه...</span>
            </div>
            
            <!-- رسالة الخطأ (مخفية افتراضياً) -->
            <div class="error-container hidden" id="errorContainer">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="errorMessage">حدث خطأ في التعرف على حسابك</p>
                <button class="retry-btn" id="retryBtn">
                    <i class="fas fa-redo"></i>
                    <span>إعادة المحاولة</span>
                </button>
            </div>
        </div>
    </div>

    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <!-- السكريبتات -->
    <script type="module" src="../shared/utils/paths.js"></script>
    <script type="module" src="../shared/js/notifications.js"></script>
    <script type="module" src="welcome.js"></script>
</body>
</html>

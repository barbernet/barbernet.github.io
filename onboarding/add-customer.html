<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكمال ملفي الشخصي | BarberFlow Pro</title>
    <meta name="description" content="أكمل معلوماتك الشخصية للحصول على أفضل تجربة">
    
    <!-- CSS المركزي -->
    <link rel="stylesheet" href="../shared/styles/global.css">
    <link rel="stylesheet" href="../shared/styles/notifications.css">
    
    <!-- CSS الخاص بالصفحة -->
    <link rel="stylesheet" href="add-customer.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>
<body data-theme="dark">
    <div class="customer-page">
        <div class="customer-container">
            <!-- رأس الصفحة -->
            <div class="page-header">
                <button class="back-btn" id="backBtn" aria-label="العودة">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div class="header-content">
                    <div class="header-icon">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h1>مرحباً بك في BarberFlow</h1>
                    <p class="page-subtitle">أكمل ملفك الشخصي للحصول على أفضل تجربة</p>
                </div>
            </div>

            <!-- نموذج المعلومات الأساسية -->
            <form id="addCustomerForm" class="customer-form">
                <!-- الصورة الشخصية (اختياري) -->
                <div class="form-section">
                    <div class="photo-upload">
                        <div class="photo-preview" id="photoPreview">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" hidden>
                        <button type="button" class="upload-btn" id="uploadBtn">
                            <i class="fas fa-camera"></i>
                            <span>إضافة صورة شخصية</span>
                        </button>
                        <button type="button" class="remove-photo-btn" id="removePhotoBtn" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- المعلومات الأساسية -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        <span>المعلومات الأساسية</span>
                    </h2>
                    
                    <div class="form-group">
                        <label for="customerName">
                            <i class="fas fa-user"></i>
                            الاسم الكامل
                        </label>
                        <input 
                            type="text" 
                            id="customerName" 
                            placeholder="أدخل اسمك الكامل"
                            required
                            minlength="2"
                        >
                    </div>

                    <div class="form-group">
                        <label for="customerPhone">
                            <i class="fas fa-phone"></i>
                            رقم الهاتف
                        </label>
                        <input 
                            type="tel" 
                            id="customerPhone" 
                            placeholder="0612345678"
                            required
                            pattern="[0-9]{10}"
                        >
                    </div>

                    <div class="form-group">
                        <label for="customerCity">
                            <i class="fas fa-map-marker-alt"></i>
                            المدينة (اختياري)
                        </label>
                        <input 
                            type="text" 
                            id="customerCity" 
                            placeholder="مثال: الدار البيضاء"
                        >
                    </div>

                    <div class="form-group">
                        <label for="customerBirthdate">
                            <i class="fas fa-birthday-cake"></i>
                            تاريخ الميلاد (اختياري)
                        </label>
                        <input 
                            type="date" 
                            id="customerBirthdate"
                        >
                    </div>
                </div>

                <!-- أزرار التحكم -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>متابعة</span>
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    
                    <button type="button" class="skip-btn" id="skipBtn">
                        <span>تخطي هذه الخطوة</span>
                        <i class="fas fa-forward"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- حاوية التنبيهات -->
    <div id="notification-container"></div>

    <!-- السكريبتات -->
    <script type="module" src="../shared/utils/paths.js"></script>
    <script type="module" src="../shared/js/notifications.js"></script>
    <script type="module" src="add-customer.js"></script>
</body>
</html>
